{% extends 'base.html' %}

{% block content %}
<style>
    body {
        background-color: #f8fafc;
    }
    
    .chat-wrapper {
        height: calc(100vh - 80px); /* Adjust based on navbar height */
        max-height: 900px;
        min-height: 600px;
        padding: 1.5rem 0;
    }

    .chat-card {
        background: #ffffff;
        border-radius: 1rem;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        border: 1px solid #e2e8f0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100%;
    }
    
    .chat-header {
        background: #ffffff;
        padding: 1rem 1.5rem;
        border-bottom: 1px solid #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }

    .chat-header-title {
        font-weight: 600;
        color: #1e293b;
        font-size: 1.125rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        background-color: #f8fafc;
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
    }
    
    .message {
        display: flex;
        gap: 1rem;
        max-width: 85%;
        animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
    }
    
    .message-avatar {
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 1rem;
    }
    
    .message.assistant .message-avatar {
        background-color: #eff6ff;
        color: #2563eb;
        border: 1px solid #dbeafe;
    }
    
    .message.user .message-avatar {
        background-color: #f1f5f9;
        color: #64748b;
    }
    
    .message-content {
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        font-size: 0.95rem;
        line-height: 1.6;
        position: relative;
    }
    
    .message.user .message-content {
        background-color: #2563eb;
        color: #ffffff;
        border-top-right-radius: 0.25rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
    }
    
    .message.assistant .message-content {
        background-color: #ffffff;
        color: #334155;
        border: 1px solid #e2e8f0;
        border-top-left-radius: 0.25rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
    }

    /* 思考过程部分 */
    .reasoning-box {
        margin-bottom: 0.75rem;
        border-radius: 0.5rem;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        overflow: hidden;
    }

    .reasoning-header {
        padding: 0.5rem 0.75rem;
        background-color: #f1f5f9;
        font-size: 0.75rem;
        font-weight: 600;
        color: #64748b;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: space-between;
        user-select: none;
    }

    .reasoning-header:hover {
        background-color: #e2e8f0;
    }

    .reasoning-body {
        padding: 0.75rem;
        font-size: 0.85rem;
        color: #475569;
        border-top: 1px solid #e2e8f0;
        display: none;
        background-color: #ffffff;
    }

    .reasoning-body.open {
        display: block;
    }

    /* Markdown Styles */
    .message-content p { margin-bottom: 0.5rem; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content ul, .message-content ol { padding-left: 1.25rem; margin-bottom: 0.5rem; }
    .message-content li { margin-bottom: 0.25rem; }
    .message-content code {
        background-color: rgba(0,0,0,0.06);
        padding: 0.1rem 0.3rem;
        border-radius: 0.25rem;
        font-family: monospace;
        font-size: 0.9em;
    }
    .message.user .message-content code {
        background-color: rgba(255,255,255,0.2);
        color: white;
    }

    /* Input Area */
    .chat-input-area {
        padding: 1rem 1.5rem;
        background-color: #ffffff;
        border-top: 1px solid #e2e8f0;
    }

    .input-group-wrapper {
        display: flex;
        gap: 0.75rem;
        align-items: flex-end;
        background-color: #f8fafc;
        border: 1px solid #cbd5e1;
        border-radius: 0.75rem;
        padding: 0.5rem;
        transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-group-wrapper:focus-within {
        border-color: #2563eb;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background-color: #ffffff;
    }

    #user-input {
        border: none;
        background: transparent;
        resize: none;
        flex: 1;
        padding: 0.5rem;
        max-height: 120px;
        min-height: 24px;
        font-size: 0.95rem;
        line-height: 1.5;
        color: #1e293b;
    }
    
    #user-input:focus {
        outline: none;
    }

    .chat-actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .model-select {
        border: none;
        background-color: transparent;
        font-size: 0.8rem;
        color: #64748b;
        padding: 0.25rem;
        cursor: pointer;
        border-radius: 0.25rem;
    }
    
    .model-select:hover {
        background-color: #e2e8f0;
        color: #334155;
    }

    #send-btn {
        width: 2.25rem;
        height: 2.25rem;
        border-radius: 0.5rem;
        background-color: #2563eb;
        color: white;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    #send-btn:hover {
        background-color: #1d4ed8;
    }

    #send-btn:disabled {
        background-color: #94a3b8;
        cursor: not-allowed;
    }

    /* Quick Questions */
    .quick-questions {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 1rem;
        justify-content: center;
    }

    .quick-chip {
        font-size: 0.8rem;
        padding: 0.35rem 0.75rem;
        border-radius: 9999px;
        background-color: #ffffff;
        border: 1px solid #e2e8f0;
        color: #475569;
        cursor: pointer;
        transition: all 0.2s;
    }

    .quick-chip:hover {
        border-color: #2563eb;
        color: #2563eb;
        background-color: #eff6ff;
    }

    /* Loading Animation */
    .typing-dots {
        display: flex;
        gap: 4px;
        padding: 4px 0;
    }
    .typing-dots span {
        width: 6px;
        height: 6px;
        background-color: #94a3b8;
        border-radius: 50%;
        animation: typing 1.4s infinite ease-in-out both;
    }
    .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
    .typing-dots span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes typing {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1); }
    }
</style>

<div class="container chat-wrapper">
    <div class="chat-card">
        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-title">
                <i class="bi bi-robot text-primary fs-5"></i>
                <span>智能医疗助手</span>
            </div>
            <div class="d-flex align-items-center gap-2">
                 <span class="badge bg-primary-subtle text-primary border border-primary-subtle rounded-pill fw-medium px-3">
                    <i class="bi bi-lightning-charge-fill me-1" style="font-size: 0.7em;"></i>
                    AI 驱动
                 </span>
            </div>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="messages-container">
            <!-- Welcome Message -->
            <div class="text-center py-5">
                <div class="mb-3">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary-subtle text-primary rounded-circle" style="width: 64px; height: 64px;">
                        <i class="bi bi-heart-pulse fs-3"></i>
                    </div>
                </div>
                <h4 class="fw-bold text-dark mb-2">有什么可以帮您？</h4>
                <p class="text-secondary small mb-4">我可以回答关于症状、药品和一般健康建议的问题。</p>
                
                <div class="quick-questions">
                    <button class="quick-chip" onclick="askQuestion('头痛伴有恶心是什么原因？')"> 头痛恶心</button>
                    <button class="quick-chip" onclick="askQuestion('感冒发烧物理降温方法')"> 发烧处理</button>
                    <button class="quick-chip" onclick="askQuestion('布洛芬怎么吃？')"> 布洛芬用法</button>
                    <button class="quick-chip" onclick="askQuestion('失眠有什么好的改善方法？')"> 失眠建议</button>
                </div>
            </div>
        </div>

        <!-- Input -->
        <div class="chat-input-area">
            <div class="input-group-wrapper">
                <textarea id="user-input" rows="1" placeholder="描述您的症状或问题..."></textarea>
                <div class="chat-actions">
                     <select id="model-select" class="model-select" title="选择模型">
                        <option value="deepseek-chat">快速模式 (V3)</option>
                        <option value="deepseek-reasoner">深度思考 (R1)</option>
                    </select>
                    <button id="send-btn" type="button">
                        <i class="bi bi-send-fill fs-6"></i>
                    </button>
                </div>
            </div>
            <div class="text-center mt-2">
                <p class="mb-0 text-muted" style="font-size: 0.7rem;">
                    AI 生成内容仅供参考，不作为医疗诊断依据。紧急情况请及时就医。
                </p>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    const messagesContainer = document.getElementById('messages-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const modelSelect = document.getElementById('model-select');
    
    // Auto-resize textarea
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        if(this.value === '') this.style.height = 'auto';
    });

    // Enter to send
    userInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    
    // Click button to send
    sendBtn.addEventListener('click', sendMessage);

    function askQuestion(text) {
        userInput.value = text;
        userInput.dispatchEvent(new Event('input'));
        sendMessage();
    }

    function appendMessage(role, content = '', reasoning = null) {
        // Clear welcome message if present
        const welcomeMsg = messagesContainer.querySelector('.text-center.py-5');
        if (welcomeMsg) {
            welcomeMsg.remove();
        }

        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${role}`;
        
        let avatarIcon = role === 'user' ? '<i class="bi bi-person"></i>' : '<i class="bi bi-robot"></i>';
        
        // Build inner HTML structure
        let innerHTML = `<div class="message-avatar">${avatarIcon}</div>`;
        innerHTML += `<div class="message-content">`;

        // Add reasoning block if exists
        if (reasoning) {
            innerHTML += `
                <div class="reasoning-box">
                    <div class="reasoning-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span><i class="bi bi-lightbulb me-1"></i> 思考过程</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="reasoning-body open">
                        ${marked.parse(reasoning)}
                    </div>
                </div>`;
        }
        
        // Add content
        innerHTML += `<div class="content-text">${content ? marked.parse(content) : '<div class="typing-dots"><span></span><span></span><span></span></div>'}</div>`;
        innerHTML += `</div>`; // Close message-content

        msgDiv.innerHTML = innerHTML;
        
        messagesContainer.appendChild(msgDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        
        return msgDiv;
    }

    function updateMessage(msgElement, content, reasoning) {
        const contentDiv = msgElement.querySelector('.message-content');
        if (!contentDiv) return;

        let html = '';
        
        if (reasoning) {
            html += `
                <div class="reasoning-box">
                    <div class="reasoning-header" onclick="this.nextElementSibling.classList.toggle('open')">
                        <span><i class="bi bi-lightbulb me-1"></i> 思考过程</span>
                        <i class="bi bi-chevron-down"></i>
                    </div>
                    <div class="reasoning-body open">
                        ${marked.parse(reasoning)}
                    </div>
                </div>`;
        }
        
        html += `<div class="content-text">${content ? marked.parse(content) : ''}</div>`;
        contentDiv.innerHTML = html;
        
        // Auto scroll
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    let conversationHistory = [];

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        // Reset input immediately
        userInput.value = '';
        userInput.style.height = 'auto'; // Reset height
        
        // Disable UI
        userInput.disabled = true;
        sendBtn.disabled = true;

        // User message
        appendMessage('user', text);
        conversationHistory.push({ role: 'user', content: text });

        // Assistant placeholder
        const assistantMsgDiv = appendMessage('assistant', null);
        let fullContent = '';
        let fullReasoning = '';
        
        try {
            const response = await fetch('/api/chat/deepseek', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: conversationHistory,
                    model: modelSelect.value
                })
            });

            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.trim().startsWith('data: ')) {
                        const dataStr = line.trim().slice(6);
                        if (dataStr === '[DONE]') break;
                        
                        try {
                            const data = JSON.parse(dataStr);
                            
                            // Handle reasoning
                            if (data.choices?.[0]?.delta?.reasoning_content) {
                                fullReasoning += data.choices[0].delta.reasoning_content;
                            }
                            
                            // Handle content
                            if (data.choices?.[0]?.delta?.content) {
                                fullContent += data.choices[0].delta.content;
                            }
                            
                            // Handle error inside stream
                             if (data.error) {
                                fullContent += `\n\n[System Error: ${data.error}]`;
                            }

                            // Update UI
                            updateMessage(assistantMsgDiv, fullContent, fullReasoning);
                            
                        } catch (e) {
                            console.warn('Error parsing stream data:', e);
                        }
                    }
                }
            }
            
            conversationHistory.push({ role: 'assistant', content: fullContent });

        } catch (error) {
            console.error('Chat error:', error);
            updateMessage(assistantMsgDiv, '抱歉，连接服务器失败，请稍后重试。');
        } finally {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    // Check for initial query from URL parameters
    document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const initialQuery = urlParams.get('initial_query');
        
        if (initialQuery) {
            // Ensure model is set to default (deepseek-chat) implicitly or explicitly
            modelSelect.value = 'deepseek-chat'; 
            askQuestion(initialQuery);
            
            // Optionally, clear the query param from URL so refresh doesn't resend
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: newUrl}, '', newUrl);
        }
    });
</script>
<!-- Include Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
{% endblock %}
